<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K. Bernard Major | Enterprise AI Strategist</title>
    <!-- Redirects after 8 seconds -->
    <meta http-equiv="refresh" content="8; url='https://www.linkedin.com/in/kbernardmajor80/'" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* Clean White */
            color: #334155;
            /* Slate 700 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            animation: fadeIn 1.2s ease-out;
            max-width: 600px;
            padding: 2rem;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #64748b;
            /* Slate 500 */
            margin-bottom: 0.5rem;
        }

        h1 strong {
            color: #0f172a;
            /* Deep Navy */
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            color: #475569;
            /* Slate 600 */
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .loader {
            border: 3px solid rgba(255, 90, 0, 0.1);
            border-top: 3px solid #ff5a00;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
            margin: 0 auto 2.5rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        a {
            color: #ff5a00;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease, text-decoration 0.2s ease;
        }

        a:hover {
            color: #e04e00;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Loading <strong>Executive Profile</strong>...</h1>
        <p>You are being securely redirected to K. Bernard Major's professional network.</p>
        <p style="font-size: 0.95rem;">
            If you are not redirected automatically within a few seconds, <br>
            <a href="https://www.linkedin.com/in/kbernardmajor80/">click here to proceed</a>.
        </p>
    </div>
</body>

</html>
